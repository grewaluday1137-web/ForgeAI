version: '3.8'

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      # Exclude node_modules from being overwritten by the host mount
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - api_repos:/app/data/repos
      - /var/run/docker.sock:/var/run/docker.sock
      - api_npm_cache:/app/data/npm_cache
      - api_pip_cache:/app/data/pip_cache
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/forgeai
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MOCK_AI=false
      - GITHUB_PAT=${GITHUB_PAT}
      - REPO_STORAGE_PATH=/app/data/repos
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=forgeai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  api_repos:
  api_npm_cache:
  api_pip_cache:
